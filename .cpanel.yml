---
deployment:
  tasks:
    - export APPPATH=/home/$USER/9sixty_backend
    - export PUBLICPATH=/home/$USER/9sixty.com
    - /bin/mkdir -p $APPPATH $PUBLICPATH
    - /bin/rsync -rltD --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r --exclude='.git/' --exclude='.env' --exclude='storage/' --exclude='bootstrap/cache/' --exclude='public/' backend/ $APPPATH/
    - /bin/rsync -rltD --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r backend/public/ $PUBLICPATH/
    - /bin/mkdir -p $APPPATH/storage/framework/cache/data $APPPATH/storage/framework/sessions $APPPATH/storage/framework/views $APPPATH/storage/logs $APPPATH/bootstrap/cache
    - /bin/chmod -R 775 $APPPATH/storage $APPPATH/bootstrap/cache
    - /bin/rm -f $APPPATH/bootstrap/cache/*.php
    - /bin/sed -i.bak "s#__DIR__.'/../vendor/autoload.php'#__DIR__.'/../9sixty_backend/vendor/autoload.php'#" $PUBLICPATH/index.php
    - /bin/sed -i.bak "s#__DIR__.'/../bootstrap/app.php'#__DIR__.'/../9sixty_backend/bootstrap/app.php'#" $PUBLICPATH/index.php
    - /bin/rm -f $PUBLICPATH/index.php.bak
    - php $APPPATH/composer install --no-dev --optimize-autoloader --no-interaction || true
    - php $APPPATH/artisan optimize:clear || true
